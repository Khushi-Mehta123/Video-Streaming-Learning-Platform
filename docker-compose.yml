version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: streaming-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: streaming
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streaming-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: streaming-livekit
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - LIVEKIT_KEYS_DEVKEY=secret
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: streaming-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/streaming?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      PORT: "5000"
      JWT_SECRET: ""
      AWS_REGION: ""
      AWS_S3_BUCKET: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""

      LIVEKIT_API_KEY: ""
      LIVEKIT_API_SECRET: ""
      LIVEKIT_URL: ""

      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""

      EMAIL_USER: ""
      EMAIL_PASS: ""

    depends_on:
      - postgres
      - redis
      - livekit
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: streaming-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
